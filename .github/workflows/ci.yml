name: my first pipeline

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: Build image
        run: |
         docker  build -t ${{secrets.DOCKER_USERNAME}}/ciportfolio:${{github.run_number}} .
         docker  build -t ${{secrets.DOCKER_USERNAME}}/ciportfolio .
      - name: Docker login
        uses: docker/login-action@v4
        with: 
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push image to registry
        run: |
         docker push ${{secrets.DOCKER_USERNAME}}/ciportfolio:${{github.run_number}}
         docker push ${{secrets.DOCKER_USERNAME}}/ciportfolio




  